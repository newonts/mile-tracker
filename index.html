<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #e5e5e5; font-family: 'Courier New', monospace; }
  input { font-family: 'Courier New', monospace; }
  button { font-family: 'Courier New', monospace; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #111; }
  ::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

  .setup { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .setup-card { max-width: 480px; width: 100%; }
  .setup-title { font-size: 28px; font-weight: 900; letter-spacing: -1px; margin-bottom: 4px; }
  .setup-sub { font-size: 11px; color: #777; letter-spacing: 3px; margin-bottom: 32px; }
  .setup-field { margin-bottom: 16px; }
  .setup-label { font-size: 10px; color: #888; letter-spacing: 2px; margin-bottom: 6px; display: block; }
  .setup-input {
    width: 100%; background: #111; border: 1px solid #333; border-radius: 4px;
    color: #e5e5e5; font-size: 13px; padding: 10px 12px; outline: none;
    transition: border-color 0.2s;
  }
  .setup-input:focus { border-color: #4ade8077; }
  .setup-input::placeholder { color: #444; }
  .setup-btn {
    width: 100%; padding: 12px; background: transparent;
    border: 1px solid #4ade8066; border-radius: 4px; color: #4ade80;
    font-size: 11px; letter-spacing: 3px; cursor: pointer; margin-top: 8px;
    transition: all 0.2s;
  }
  .setup-btn:hover { background: #4ade8011; }
  .setup-btn:disabled { opacity: 0.4; cursor: default; }
  .setup-hint { font-size: 10px; color: #666; line-height: 1.8; margin-top: 24px; }
  .setup-error { font-size: 10px; color: #f87171; margin-top: 8px; letter-spacing: 1px; }
  .save-badge { font-size: 10px; letter-spacing: 2px; padding: 4px 8px; border-radius: 3px; transition: all 0.3s; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

    days:[

    ]},
  { week:11, miles:24, dates:"Jun 10–16",    notes:"Practice Mile 2 (target 5:00–5:10). Execute sub-5 plan exactly.",
    milestone:"🏁 Practice Mile 2",
    days:[
      {am:"Easy 4mi",            pm:null,           type:"easy"},

      {am:"Easy 2mi",            pm:null,           type:"easy"},
      {am:"Easy 2mi+strides",    pm:null,           type:"easy"},
      {am:"Rest",                pm:null,           type:"rest"},

      {am:"Easy 2mi+strides",    pm:null,           type:"easy"},

    ]},
];

const DAY_LABELS = ["MON","TUE","WED","THU","FRI","SAT","SUN"];
const getPhaseIdx = w => w<=4?0:w<=7?1:w<=11?2:3;

async function gistLoad(token, gistId) {
  const r = await fetch(`https://api.github.com/gists/${gistId}`, {
    headers: { Authorization: `token ${token}`, Accept: "application/vnd.github.v3+json" }
  });
  if (!r.ok) throw new Error(`GitHub ${r.status}`);
  const data = await r.json();
  const file = data.files[GIST_FILENAME];
  if (!file) return null;
  return JSON.parse(file.content);
}

async function gistSave(token, gistId, payload) {
  const r = await fetch(`https://api.github.com/gists/${gistId}`, {
    method: "PATCH",
    headers: { Authorization: `token ${token}`, Accept: "application/vnd.github.v3+json", "Content-Type": "application/json" },
    body: JSON.stringify({ files: { [GIST_FILENAME]: { content: JSON.stringify(payload) } } })
  });
  if (!r.ok) throw new Error(`GitHub ${r.status}`);
}

function SetupScreen({ onConnect }) {
  const [token, setToken]   = useState("");
  const [gistId, setGistId] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError]   = useState("");

  const connect = async () => {
    setLoading(true); setError("");
    try {
      const data = await gistLoad(token.trim(), gistId.trim());
      localStorage.setItem("mt_token", token.trim());
      localStorage.setItem("mt_gist",  gistId.trim());
      onConnect(token.trim(), gistId.trim(), data || { completed:{}, mileTimes:{ pm0:"", pm1:"", pm2:"", test:"" } });
    } catch(e) {
      setError("Could not connect. Check your token and Gist ID.");
    } finally { setLoading(false); }
  };

  return (
    <div className="setup">
      <div className="setup-card">
        <div className="setup-title">SUB-5:00<span style={{color:"#4ade80"}}>.</span></div>
        <div className="setup-sub">MILE BLOCK · APR–JUN 2026</div>
        <div className="setup-field">
          <label className="setup-label">GITHUB PERSONAL ACCESS TOKEN</label>
          <input className="setup-input" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
            value={token} onChange={e => setToken(e.target.value)} />
        </div>
        <div className="setup-field">
          <label className="setup-label">GIST ID</label>
          <input className="setup-input" placeholder="a1b2c3d4e5f6..."
            value={gistId} onChange={e => setGistId(e.target.value)} />
        </div>
        <button className="setup-btn" onClick={connect} disabled={!token || !gistId || loading}>
          {loading ? "CONNECTING…" : "CONNECT →"}
        </button>
        {error && <div className="setup-error">{error}</div>}
        <div className="setup-hint">
          Token needs only the <strong style={{color:"#aaa"}}>gist</strong> scope.<br/>
          Gist ID is the long string in the URL of your gist.<br/>
          Credentials stored in your browser only — never sent anywhere except GitHub.
        </div>
      </div>
    </div>
  );
}

function Tracker({ token, gistId, initialData }) {
  const [completed,  setCompleted]  = useState(initialData.completed  || {});
  const [mileTimes,  setMileTimes]  = useState(initialData.mileTimes  || { pm0:"", pm1:"", pm2:"", test:"" });
  const [expanded,   setExpanded]   = useState(null);
  const [saveStatus, setSaveStatus] = useState(null);
  const saveTimer = useRef(null);

  const persist = useCallback((comp, times) => {
    clearTimeout(saveTimer.current);
    setSaveStatus("saving");
    saveTimer.current = setTimeout(async () => {
      try {
        await gistSave(token, gistId, { completed: comp, mileTimes: times });
        setSaveStatus("saved");
        setTimeout(() => setSaveStatus(null), 1500);
      } catch { setSaveStatus("error"); }
    }, 600);
  }, [token, gistId]);

  const toggle = key => {
    setCompleted(prev => {
      const next = { ...prev, [key]: !prev[key] };
      persist(next, mileTimes);
      return next;
    });
  };

  const updateTime = (key, val) => {
    setMileTimes(prev => {
      const next = { ...prev, [key]: val };
      persist(completed, next);
      return next;
    });
  };

  const { total, done } = weekData.reduce((acc, w) => {
    w.days.forEach((d,i) => {
      if (d.type!=="rest") { acc.total++; if (completed[`${w.week}-${i}-am`]) acc.done++; }
      if (d.pm)            { acc.total++; if (completed[`${w.week}-${i}-pm`]) acc.done++; }
    });
    return acc;
  }, { total:0, done:0 });
  const pct = Math.round((done/total)*100);

  const currentWeek = (() => {
    for (const w of weekData) {
      const allDone = w.days.every((d,i) =>
        (d.type==="rest" || completed[`${w.week}-${i}-am`]) &&
        (!d.pm || completed[`${w.week}-${i}-pm`])
      );
      if (!allDone) return w.week;
    }
    return 13;
  })();

  const phaseProgress = phases.map(p => {
    let t=0, d=0;
    weekData.filter(w=>p.weeks.includes(w.week)).forEach(w=>{
      w.days.forEach((day,i)=>{
        if (day.type!=="rest") { t++; if(completed[`${w.week}-${i}-am`]) d++; }
        if (day.pm)            { t++; if(completed[`${w.week}-${i}-pm`]) d++; }
      });
    });
    return { ...p, pct: t ? Math.round((d/t)*100) : 0 };
  });

  const amBg = (phase, type, isDone) => {
    if (type==="rest") return "transparent";
    if (isDone) return type==="quality" ? phase.color : "#4ade80";
    return type==="quality" ? phase.color+"33" : "#2a2a2a";
  };
  const amBorder = (phase, type, isDone) => {
    if (type==="rest") return "#222";
    if (isDone) return type==="quality" ? phase.color : "#4ade80aa";
    return type==="quality" ? phase.color+"77" : "#444";
  };

  return (
    <div style={{ minHeight:"100vh", background:"#0a0a0a", padding:"24px 16px", maxWidth:700, margin:"0 auto" }}>

      {/* Header */}
      <div style={{ marginBottom:28 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
          <div>
            <div style={{ fontSize:11, letterSpacing:4, color:"#888", marginBottom:6 }}>APR 1 → JUN 29, 2026</div>
            <div style={{ fontSize:32, fontWeight:900, letterSpacing:-1, lineHeight:1 }}>
              SUB-5:00<span style={{color:"#4ade80"}}>.</span>
            </div>
            <div style={{ fontSize:12, color:"#777", marginTop:5, letterSpacing:2 }}>13-WEEK MILE BLOCK</div>
          </div>
          <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:8 }}>
            {saveStatus && (
              <div className="save-badge" style={{
                color:      saveStatus==="error" ? "#f87171" : saveStatus==="saving" ? "#888" : "#4ade80",
                border:`1px solid ${saveStatus==="error" ? "#f8717155" : saveStatus==="saving" ? "#444" : "#4ade8055"}`,
              }}>
                {saveStatus==="saving" ? "SAVING…" : saveStatus==="saved" ? "SAVED ✓" : "SAVE ERROR"}
              </div>
            )}
            <button onClick={() => { localStorage.clear(); window.location.reload(); }}
              style={{ fontSize:9, color:"#666", background:"transparent", border:"1px solid #2a2a2a", borderRadius:3, padding:"4px 8px", cursor:"pointer", letterSpacing:1 }}>
              DISCONNECT
            </button>
          </div>
        </div>

        {/* Overall progress */}
        <div style={{ marginTop:22 }}>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6, fontSize:11, color:"#aaa" }}>
            <span>{done} / {total} sessions</span>
            <span style={{color:"#4ade80", fontWeight:700}}>{pct}%</span>
          </div>
          <div style={{ height:6, background:"#1f1f1f", borderRadius:3, overflow:"hidden" }}>
            <div style={{ height:"100%", width:`${pct}%`, background:"linear-gradient(90deg,#4ade80,#fb923c,#f87171,#c084fc)", transition:"width 0.4s" }} />
          </div>
        </div>

        {/* Phase bars */}
        <div style={{ display:"flex", gap:8, marginTop:12 }}>
          {phaseProgress.map(p => (
            <div key={p.name} style={{ flex:p.weeks.length, minWidth:0 }}>
              <div style={{ fontSize:9, color:"#777", letterSpacing:1, marginBottom:4, overflow:"hidden", whiteSpace:"nowrap" }}>{p.name}</div>
              <div style={{ height:4, background:"#1f1f1f", borderRadius:2, overflow:"hidden" }}>
                <div style={{ height:"100%", width:`${p.pct}%`, background:p.color, transition:"width 0.4s" }} />
              </div>
              <div style={{ fontSize:9, color:"#777", marginTop:3 }}>{p.pct}%</div>
            </div>
          ))}
        </div>
      </div>

      {/* Mile times */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:8, marginBottom:24, background:"#111", border:"1px solid #252525", borderRadius:8, padding:14 }}>
        {[
          {key:"pm0", label:"WK 7 MILE", target:"5:20–5:40"},
          {key:"pm1", label:"WK 9 MILE", target:"5:10–5:20"},
          {key:"pm2", label:"WK 11 MILE",target:"5:00–5:10"},
          {key:"test",label:"TEST DAY",  target:"sub-5:00"},
        ].map(m => (
          <div key={m.key} style={{ textAlign:"center" }}>
            <div style={{ fontSize:9, color:"#888", letterSpacing:1, marginBottom:5 }}>{m.label}</div>
            <input value={mileTimes[m.key]} onChange={e => updateTime(m.key, e.target.value)}
              placeholder={m.target}
              style={{
                width:"100%", background: mileTimes[m.key] ? "#0d1f0d" : "#0d0d0d",
                border:`1px solid ${mileTimes[m.key] ? "#4ade8066" : "#2a2a2a"}`,
                borderRadius:4, color: mileTimes[m.key] ? "#4ade80" : "#555",
                fontSize:11, textAlign:"center", padding:"6px 2px", outline:"none",
              }} />
          </div>
        ))}
      </div>

      {/* Legend */}
      <div style={{ display:"flex", gap:16, marginBottom:14, fontSize:10, color:"#777", letterSpacing:1 }}>
        <span>● EASY RUN</span>
        <span>■ QUALITY RUN</span>
        <span style={{color:"#60a5faaa"}}>◆ STRENGTH</span>
      </div>

      {/* Weeks */}
      <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
        {weekData.map(w => {
          const phase = phases[getPhaseIdx(w.week)];
          let wt=0, wd=0;
          w.days.forEach((d,i)=>{
            if(d.type!=="rest"){wt++;if(completed[`${w.week}-${i}-am`])wd++;}
            if(d.pm){wt++;if(completed[`${w.week}-${i}-pm`])wd++;}
          });
          const isExp      = expanded === w.week;
          const isCurrent  = w.week === currentWeek;
          const isComplete = wd === wt;

          return (
            <div key={w.week} style={{
              border:`1px solid ${isCurrent ? phase.color+"66" : isComplete ? "#1f3f1f" : "#1f1f1f"}`,
              borderRadius:6, overflow:"hidden",
              background: isCurrent ? "#0f0f0f" : "transparent",
            }}>
              {/* Collapsed row */}
              <div style={{ display:"flex", alignItems:"center", gap:10, padding:"9px 14px", cursor:"pointer" }}
                onClick={() => setExpanded(isExp ? null : w.week)}>

                {/* Week label */}
                <div style={{ fontSize:11, fontWeight:700, color: isCurrent ? phase.color : "#aaa", letterSpacing:1, minWidth:44 }}>
                  WK {w.week}
                </div>

                {/* Mileage */}
                <div style={{ fontSize:10, color:"#777", minWidth:40 }}>{w.miles} mi</div>

                {/* Dots */}
                <div style={{ display:"flex", gap:5, flex:1 }}>
                  {w.days.map((d,i) => {
                    const amDone = completed[`${w.week}-${i}-am`];
                    const pmDone = completed[`${w.week}-${i}-pm`];
                    const isRest = d.type==="rest";
                    return (
                      <div key={i} style={{ display:"flex", flexDirection:"column", gap:3, alignItems:"center" }}>
                        <div
                          onClick={e=>{ e.stopPropagation(); if(!isRest) toggle(`${w.week}-${i}-am`); }}
                          title={`${DAY_LABELS[i]} AM: ${d.am}`}
                          style={{
                            width:13, height:13,
                            borderRadius: d.type==="quality" ? 2 : "50%",
                            background: amBg(phase, d.type, amDone),
                            border:`1px solid ${amBorder(phase, d.type, amDone)}`,
                            cursor: isRest ? "default" : "pointer",
                            flexShrink:0, transition:"all 0.15s",
                          }}
                        />
                        {d.pm ? (
                          <div
                            onClick={e=>{ e.stopPropagation(); toggle(`${w.week}-${i}-pm`); }}
                            title={`${DAY_LABELS[i]} PM: ${d.pm}`}
                            style={{
                              width:11, height:11, borderRadius:1, transform:"rotate(45deg)",
                              background: pmDone ? "#60a5fa" : "#60a5fa33",
                              border:`1px solid ${pmDone ? "#60a5fa" : "#60a5fa66"}`,
                              cursor:"pointer", flexShrink:0, transition:"all 0.15s",
                            }}
                          />
                        ) : <div style={{width:11,height:11}} />}
                      </div>
                    );
                  })}
                </div>

                {/* Count */}
                <div style={{ fontSize:10, color: isComplete ? "#4ade80" : "#777", minWidth:28, textAlign:"right" }}>
                  {wd}/{wt}
                </div>

                {/* Milestone */}
                {w.milestone && (
                  <div style={{ fontSize:10, color:phase.color, whiteSpace:"nowrap", fontWeight:600 }}>
                    {w.milestone}
                  </div>
                )}
              </div>

              {/* Expanded */}
              {isExp && (
                <div style={{ padding:"0 14px 14px", borderTop:"1px solid #1f1f1f", paddingTop:12 }}>
                  <div style={{ fontSize:10, color:"#888", marginBottom:12, lineHeight:1.6 }}>
                    {w.dates} &nbsp;·&nbsp; {w.notes}
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:5 }}>
                    {w.days.map((d,i) => {
                      const isRest = d.type==="rest";
                      const amDone = completed[`${w.week}-${i}-am`];
                      const pmDone = completed[`${w.week}-${i}-pm`];
                      return (
                        <div key={i} style={{ textAlign:"center" }}>
                          <div style={{ fontSize:8, color:"#666", letterSpacing:1, marginBottom:5 }}>{DAY_LABELS[i]}</div>
                          {/* AM card */}
                          <div onClick={()=>{ if(!isRest) toggle(`${w.week}-${i}-am`); }}
                            style={{
                              padding:"6px 4px", marginBottom: d.pm ? 4 : 0,
                              background: isRest ? "transparent" : amDone ? (d.type==="quality" ? phase.color+"28" : "#0d200d") : "#141414",
                              border:`1px solid ${isRest ? "#1a1a1a" : amDone ? (d.type==="quality" ? phase.color+"88" : "#4ade8066") : "#282828"}`,
                              borderRadius:4, cursor: isRest ? "default" : "pointer",
                              opacity: isRest ? 0.25 : 1,
                            }}>
                            <div style={{ fontSize:8, color: d.type==="quality" ? phase.color : "#bbb", lineHeight:1.5 }}>{d.am}</div>
                            {!isRest && amDone && <div style={{ fontSize:9, color:"#4ade80", marginTop:3 }}>✓</div>}
                          </div>
                          {/* PM card */}
                          {d.pm && (
                            <div onClick={()=>toggle(`${w.week}-${i}-pm`)}
                              style={{
                                padding:"6px 4px",
                                background: pmDone ? "#0c1428" : "#141414",
                                border:`1px solid ${pmDone ? "#60a5fa77" : "#282828"}`,
                                borderRadius:4, cursor:"pointer",
                              }}>
                              <div style={{ fontSize:8, color:"#60a5fa", lineHeight:1.5 }}>{d.pm}</div>
                              {pmDone && <div style={{ fontSize:9, color:"#60a5fa", marginTop:3 }}>✓</div>}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div style={{ marginTop:24, textAlign:"center", fontSize:10, color:"#555", letterSpacing:2 }}>
        ● EASY &nbsp;·&nbsp; ■ QUALITY &nbsp;·&nbsp; ◆ STRENGTH
      </div>
    </div>
  );
}

function App() {
  const [creds,   setCreds]   = useState(() => {
    const token  = localStorage.getItem("mt_token");
    const gistId = localStorage.getItem("mt_gist");
    return (token && gistId) ? { token, gistId } : null;
  });
  const [data,    setData]    = useState(null);
  const [loading, setLoading] = useState(!!creds);
  const [error,   setError]   = useState("");

  useEffect(() => {
    if (!creds) return;
    gistLoad(creds.token, creds.gistId)
      .then(d => setData(d || { completed:{}, mileTimes:{ pm0:"", pm1:"", pm2:"", test:"" } }))
      .catch(() => { setError("Could not load data."); })
      .finally(() => setLoading(false));
  }, []);

  if (!creds) return <SetupScreen onConnect={(token, gistId, d) => { setCreds({token,gistId}); setData(d); }} />;
  if (loading) return (
    <div style={{ minHeight:"100vh", background:"#0a0a0a", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'Courier New',monospace", color:"#777", fontSize:12, letterSpacing:4 }}>
      LOADING…
    </div>
  );
  if (error) return (
    <div style={{ minHeight:"100vh", background:"#0a0a0a", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:16, fontFamily:"'Courier New',monospace" }}>
      <div style={{ color:"#f87171", fontSize:12, letterSpacing:2 }}>{error}</div>
      <button onClick={() => { localStorage.clear(); window.location.reload(); }}
        style={{ color:"#777", background:"transparent", border:"1px solid #333", borderRadius:3, padding:"8px 16px", cursor:"pointer", fontSize:10, letterSpacing:2 }}>
        RECONNECT
      </button>
    </div>
  );
  if (data) return <Tracker token={creds.token} gistId={creds.gistId} initialData={data} />;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
